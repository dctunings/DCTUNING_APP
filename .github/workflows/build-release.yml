name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (for native modules)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: npm install

      - name: Create .env
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=https://eqfmeavkefflwmzihqkd.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE" >> .env

      - name: Build (electron-vite)
        run: npx electron-vite build
        env:
          VITE_SUPABASE_URL: "https://eqfmeavkefflwmzihqkd.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE"

      - name: Package installer (electron-builder)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: pkg
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: List release output
        shell: bash
        run: ls release/ || echo "release folder empty"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: DCTuning Desktop v${{ steps.pkg.outputs.version }}
          body: |
            ## DCTuning Desktop v${{ steps.pkg.outputs.version }}

            ### What's new — Zone Editor flipped to pro tuning convention (RPM left, Load top)
            Zone Editor now displays with **RPM down the left column** and **Load across the top row**,
            matching ECM Titanium / WinOLS / KESS / MPPS convention. Previously was rows=Load /
            cols=RPM which is how the Kf_ binary stores the data internally but NOT how pro tuners
            expect to see it.

            - **Row headers (going down)** = RPM axis values (increasing top → bottom)
            - **Column headers (across top)** = Load/IQ axis values (increasing left → right)
            - **Corner cell** label: RPM on top line, Load on bottom line
            - **Binary write path unchanged** — the transpose is display-only. Cell coordinates
              stored in edits still use (dataRow, dataCol) = (Load idx, RPM idx) internally so
              writeMap hits the correct binary bytes.
            - Select, drag, Pg+/Pg- all work exactly the same in view coords; the binary bytes
              modified are the correct ones.

            Previous v3.5.12 changes (Stage 1 tone-down + 13 new pro-comparison-verified mapDefs)
            still in effect — see v3.5.12 notes for the tuning values that were corrected.

            ### Installation
            Download `DCTuning-Installer-{version}.exe`. Wizard walks you through install.
            **Uninstall any previous version first** from Add/Remove Programs.

            ---

            (Previous v3.5.12 notes retained below for reference)

            ### Previous — EDC17 Stage 1 rewritten to match pro-tune reality
            Verified against a real professional Stage 1 reference file for the same Audi A4
            03L906018JL binary. Our Stage 1 was far too aggressive on a few maps while
            missing 60+ related maps the pro tuner modifies.

            **1. Toned down Stage 1 multipliers to pro-realistic values:**
            - Torque Limit: +28% → +10% (pro: +4.6%)
            - Boost Target: +18% → +4% (pro: +1.2%)
            - Torque→IQ: +15% → +5%
            - Driver's Wish: +15% → stock (pro leaves stock on Stage 1)
            - Rail Pressure: +8% → stock (pro leaves stock for injector longevity)
            - IQ Base C46: +8% → +4%
            - Smoke MAF: +12% → +8%
            - N75 Wastegate: +8% → +2%
            - Primary Smoke: +12% (unchanged — matches pro +11.1%)
            - Torque Monitor: 3.28× (unchanged — must disable ECM monitoring)

            **2. Added 13 new mapDefs covering maps the pro tuner edits:**
            - 5× Gear-Variant Torque Targets (+5% each) — matches pro's per-gear +4.6% approach
            - 3× Torque Demand Variants (+4%) — pro +3.4% spread
            - 4× IQ Variant maps (+3%) — pro +2-4% spread across IQ family
            - Secondary Smoke Limiter 7×5 (+10%) — pro +58% (conservative; user can adjust)

            **Net result**: Stage 1 now modifies ~25 maps with conservative individual
            changes (pro-tune philosophy: spread-out small adjustments) instead of 13 maps
            with aggressive jumps. Should produce comparable power gains to pro tune with
            better drivability, lower EGTs, and less stress on injectors/turbo.

            All new signatures verified against both Leon (FJ 103 kW) and Audi A4 (JL
            119.9 kW) EDC17 C46 binaries by direct byte-level comparison against the pro
            reference tune.

            ### Installation
            Download `DCTuning-Installer-{version}.exe`. Wizard walks you through install.
            **Uninstall any previous version first** from Add/Remove Programs.
          files: |
            release/*.exe
            release/*.exe.blockmap
          fail_on_unmatched_files: false
          make_latest: true

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build:web
        env:
          VITE_SUPABASE_URL: "https://eqfmeavkefflwmzihqkd.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE"
          VITE_WEB_MODE: "true"
          VITE_APP_URL: "https://app.dctuning.ie"

      - name: Deploy to web-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-dist
          publish_branch: web-deploy
