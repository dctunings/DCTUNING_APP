name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (for native modules)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: npm install

      - name: Create .env
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=https://eqfmeavkefflwmzihqkd.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE" >> .env

      - name: Build (electron-vite)
        run: npx electron-vite build
        env:
          VITE_SUPABASE_URL: "https://eqfmeavkefflwmzihqkd.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE"

      - name: Package installer (electron-builder)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: pkg
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: List release output
        shell: bash
        run: ls release/ || echo "release folder empty"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: DCTuning Desktop v${{ steps.pkg.outputs.version }}
          body: |
            ## DCTuning Desktop v${{ steps.pkg.outputs.version }}

            ### What's new
            - Remap Builder: DPF Off now works for all diesel ECUs (EDC16, EDC17, DCM35, DCM61, EMS3120, PCR21)
            - Remap Builder: 6 new emissions add-ons — AdBlue/SCR Delete, DPF Sensors Off, EGR DTCs Delete, Cat Monitor Off, SAI Delete, EVAP Off
            - Remap Builder: Improved ECU detection — requires ident string match, not just file size
            - ME7: now covers NA variants (A4 1.6, Golf 1.6, Passat 1.6/1.8)
            - Tune Manager: vehicle names properly formatted, cleaned up library card display
            - Removed all PCMFlash references

            ### Installation
            Download and run the `.exe` installer. Administrator rights required.
          files: |
            release/*.exe
            release/*.exe.blockmap
          fail_on_unmatched_files: false
          make_latest: true

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build:web
        env:
          VITE_SUPABASE_URL: "https://eqfmeavkefflwmzihqkd.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE"
          VITE_WEB_MODE: "true"
          VITE_APP_URL: "https://app.dctuning.ie"

      - name: Deploy to web-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-dist
          publish_branch: web-deploy
