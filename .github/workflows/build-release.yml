name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (for native modules)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: npm install

      - name: Create .env
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=https://eqfmeavkefflwmzihqkd.supabase.co" > .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE" >> .env

      - name: Build (electron-vite)
        run: npx electron-vite build
        env:
          VITE_SUPABASE_URL: "https://eqfmeavkefflwmzihqkd.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE"

      - name: Package installer (electron-builder)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: pkg
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: List release output
        shell: bash
        run: ls release/ || echo "release folder empty"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: DCTuning Desktop v${{ steps.pkg.outputs.version }}
          body: |
            ## DCTuning Desktop v${{ steps.pkg.outputs.version }}

            ### What's new — flash-safety fixes (you were about to brick an ECU)
            Two bugs in the remap build were producing false-alarm "critical not found"
            and silently NOT writing the torque-monitor disable:

            - **Torque Monitoring Map was being blocked by the uniform-map safety gate.**
              The safety check correctly refuses to write maps whose raw data is uniform
              (indicates wrong address → would brick ECU). But the torque monitor ceiling
              IS intentionally flat (all cells = 1000 Nm). The `allowUniform` flag now
              bypasses the safety gate, so the ceiling actually raises to 3277 Nm to
              disable P060A monitoring as intended.
            - **`edc17_fuel_quantity` was flagged critical but doesn't exist in C46
              stripped variants.** This caused a red "1 critical map not found" warning
              for C46 binaries even though the C46-specific `edc17_iq_base_c46` (which
              IS the real fuel delivery map for these ECUs) was found correctly.
              Critical flag moved to the C46 variant — Stage 1 builds on C46 binaries
              no longer throw false-alarm flashing warnings.

            ### Installation
            Download `DCTuning-Installer-{version}.exe`. Wizard walks you through install.
            **Uninstall any previous version first** from Add/Remove Programs.
          files: |
            release/*.exe
            release/*.exe.blockmap
          fail_on_unmatched_files: false
          make_latest: true

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build:web
        env:
          VITE_SUPABASE_URL: "https://eqfmeavkefflwmzihqkd.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxZm1lYXZrZWZmbHdtemlocWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjQzMjksImV4cCI6MjA4OTEwMDMyOX0.1F1v2KOm30s-o2lRmy5ZuNf3B1Cm8FTx8FpHWLANrIE"
          VITE_WEB_MODE: "true"
          VITE_APP_URL: "https://app.dctuning.ie"

      - name: Deploy to web-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-dist
          publish_branch: web-deploy
